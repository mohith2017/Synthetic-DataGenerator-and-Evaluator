models:
  anthropic:
    model: claude-haiku-4-5-20251001
    temperature: 0.0
  judge:
    provider: openai
    model: gpt-5.5
    temperature: 0.0

evaluation:
  pass_threshold: 0.6
  max_concurrent: 4

split:
  train: 0.7
  val: 0.15
  test: 0.15

review:
  spot_check_per_category: 3
